<div class="search-box">
    <form action="/search" method="GET" class="search-form">
        <input type="search" name="q" placeholder="Поиск заметок..." value="{{.Query}}" />
        <select name="section">
            <option value="">Все разделы</option>
            {{range .Sections}}
            <option value="{{.Name}}" {{if eq .Name $.SectionFilter}}selected{{end}}>{{.Name}}</option>
            {{end}}
        </select>
        <button type="submit" class="btn btn-primary" aria-label="Поиск">
            🔍
        </button>
    </form>
</div>
